name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pre-commit
      - run: ruff check .
      - run: pre-commit run --all-files --show-diff-on-failure || (echo "Pre-commit hooks failed. Run 'pre-commit run --all-files' locally to fix." && false)
      - name: Verify migration files are valid Python
        run: python -m compileall alembic/versions/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pytest httpx
      - run: pytest -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t cvision-api .
